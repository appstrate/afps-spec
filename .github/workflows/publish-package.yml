name: Publish @afps-spec/* to npm

on:
  push:
    tags:
      - "afps-schema@*"
      - "afps-types@*"
      - "afps-platform-tools@*"
  workflow_dispatch:
    inputs:
      package:
        description: "Package directory under packages/ (e.g. schema, types, platform-tools)"
        required: true

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Quality, Tests & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Parse tag → package name + version
        id: parse
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PKG="${{ inputs.package }}"
            VERSION=""
          else
            REF="${GITHUB_REF_NAME}"
            # tag format: afps-<package>@<version>  (e.g. afps-types@1.0.0)
            PREFIX="${REF%@*}"           # → afps-<package>
            PKG="${PREFIX#afps-}"        # → <package>
            VERSION="${REF#*@}"          # → <version>
          fi
          if [ -z "$PKG" ]; then
            echo "::error::could not parse package name from ref '${GITHUB_REF_NAME}' / input '${{ inputs.package }}'"
            exit 1
          fi
          echo "package=$PKG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dir=packages/$PKG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: "1.3.9"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install (workspace)
        run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        working-directory: ${{ steps.parse.outputs.dir }}
        run: |
          TAG_VERSION="${{ steps.parse.outputs.version }}"
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Typecheck
        working-directory: ${{ steps.parse.outputs.dir }}
        run: bun run typecheck

      - name: Tests
        working-directory: ${{ steps.parse.outputs.dir }}
        run: bun test

      - name: Publish to npm
        working-directory: ${{ steps.parse.outputs.dir }}
        # bun pack rewrites `workspace:*` deps to the concrete published
        # version on the fly; npm publish consumes the tarball it
        # produces. No ad-hoc package.json surgery required.
        run: bun publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          generate_release_notes: true
